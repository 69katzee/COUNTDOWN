<!DOCTYPE html>
<html>
<head>
    <title>Waiting For Your Reply ❤️</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#ff9a9e,#fad0c4);
            font-family:Arial,sans-serif;
            text-align:center;
            color:white;
        }

        .card{
            background:rgba(255,255,255,0.15);
            padding:40px;
            border-radius:20px;
            backdrop-filter:blur(10px);
        }

        h1{
            margin-bottom:10px;
        }

        #timer{
            font-size:2rem;
            font-weight:bold;
            margin-top:20px;
        }

        p{
            opacity:0.9;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Waiting For Your Reply ❤️</h1>
    <p>Since I sent my message...</p>

    <div id="timer">00:00:00:00</div>
</div>

<script>

const sentTime = new Date("2026-06-27T00:00:00");

function updateTimer(){

    const now = new Date();

    const diff = now - sentTime;

    const days = Math.floor(diff / (1000*60*60*24));

    const hours = Math.floor(
        (diff % (1000*60*60*24))
        /(1000*60*60)
    );

    const minutes = Math.floor(
        (diff % (1000*60*60))
        /(1000*60)
    );

    const seconds = Math.floor(
        (diff % (1000*60))
        /1000
    );

    document.getElementById("timer").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateTimer,1000);

updateTimer();

</script>

</body>
</html>
